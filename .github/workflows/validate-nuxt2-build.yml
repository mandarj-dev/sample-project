name: Validate Nuxt2 Static Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nuxt2-migration-sample

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Static Site
        run: npm run generate:static

      - name: Verify Output
        run: |
          echo "Checking dist folder..."
          ls -la
          ls -la dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt2-dist
          path: nuxt2-migration-sample/dist
